<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log in · Quiz Challenge</title>
<link rel="stylesheet" href="css/style.css">
<style>
  body {
    display: flex; align-items: stretch;
    justify-content: stretch; padding: 0;
    min-height: 100vh; background: var(--bg);
  }
  .login-split {
    display: flex; width: 100%; min-height: 100vh;
  }

  /* ── Left image panel ── */
  .login-left {
    flex: 0 0 45%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .login-left img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
  }

  /* ── Right form panel ── */
  .login-right {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 3rem 2rem;
    background: var(--bg); overflow-y: auto;
  }
  .login-right-inner { width: 100%; max-width: 360px; }

  .right-brand {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 2.25rem;
  }
  .right-heading { margin-bottom: 2rem; }
  .right-heading h1 {
    font-family: var(--font-display);
    font-size: 32px; font-weight: 800;
    letter-spacing: -0.03em; color: var(--on-dark);
    line-height: 1.1; margin-bottom: 6px;
  }
  .right-heading h1 span { color: var(--accent); }
  .right-heading p { font-size: 13px; color: var(--on-dark-soft); }

  /* Dark-themed form inputs */
  .field label { color: var(--on-dark-soft); }
  .field input {
    background: #161616; border-color: var(--border-dark); color: var(--on-dark);
  }
  .field input::placeholder { color: #555; }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(245,158,11,0.12);
  }
  .btn-primary { background: var(--accent); color: var(--bg); font-weight: 700; }
  .btn-primary:hover { background: var(--accent-dark); }

  .auth-switch { color: var(--on-dark-soft); margin-top:1rem; text-align:center; font-size:13px; }
  .auth-switch a { color: var(--accent); cursor:pointer; font-weight:600; text-decoration:none; }

  .alert-error   { background: rgba(220,38,38,0.1); border-color: var(--red);   color: #FCA5A5; }
  .alert-success { background: rgba(22,163,74,0.1);  border-color: var(--green); color: #86EFAC; }

  .seed-note {
    font-size: 11px; color: #444; text-align: center;
    margin-top: 1.25rem; border-top: 1px solid var(--border-dark);
    padding-top: 1rem; line-height: 1.8; font-family: var(--font-mono);
  }
  .seed-note b { color: #666; font-weight: 500; }

  /* Mobile: stack vertically */
  @media (max-width: 640px) {
    .login-split { flex-direction: column; }
    .login-left  { flex: none; height: 220px; }
    .login-right { padding: 2rem 1.25rem; }
  }
</style>
</head>
<body>
<div class="login-split">

  <!-- LEFT: your image here -->
  <div class="login-left">
    <img src="login-art.png" alt="Quiz illustration">
    <!--
      Place your image file in the public/ folder.
      Rename it to login-art.png (or change the src above to match your filename).
      Recommended: tall portrait image, at least 600×800px.
    -->
  </div>

  <!-- RIGHT: form -->
  <div class="login-right">
    <div class="login-right-inner">

      <div class="right-brand">
        <div class="brand-mark">Q</div>
        <div class="brand-name" style="color:var(--on-dark)">Quiz Challenge</div>
      </div>

      <div class="status-row" style="margin-bottom:1.5rem">
        <div class="server-status">
          <span class="dot" id="status-dot"></span>
          <span id="status-text">Connecting…</span>
        </div>
      </div>

      <div class="right-heading">
        <h1 id="page-title">Welcome <span>back.</span></h1>
        <p id="page-sub">Sign in to play and track your scores.</p>
      </div>

      <div id="alert-area"></div>

      <div class="field">
        <label for="auth-username">Username</label>
        <input id="auth-username" type="text" autocomplete="username" placeholder="your_username">
      </div>
      <div class="field">
        <label for="auth-password">Password</label>
        <input id="auth-password" type="password" autocomplete="current-password" placeholder="••••••••">
      </div>
      <button class="btn-primary" id="auth-submit" onclick="doLogin()">Log in →</button>

      <div class="auth-switch">
        No account? <a onclick="showRegister()">Sign up</a>
      </div>

      

    </div>
  </div>

</div>

<script src="js/app.js"></script>
<script>
let mode = 'login';

function showAlert(type, text) {
  document.getElementById('alert-area').innerHTML =
    `<div class="alert alert-${type}">${escapeHtml(text)}</div>`;
}
function clearAlert() { document.getElementById('alert-area').innerHTML = ''; }

function showLogin() {
  mode = 'login';
  document.getElementById('page-title').innerHTML = 'Welcome <span>back.</span>';
  document.getElementById('page-sub').textContent = 'Sign in to play and track your scores.';
  document.getElementById('auth-submit').textContent = 'Log in →';
  document.getElementById('auth-submit').onclick = doLogin;
  document.getElementById('auth-password').autocomplete = 'current-password';
  document.querySelector('.auth-switch').innerHTML = `No account? <a onclick="showRegister()">Sign up</a>`;
  document.getElementById('seed-note').style.display = '';
  clearAlert();
}

function showRegister() {
  mode = 'register';
  document.getElementById('page-title').innerHTML = 'Create<br><span>account.</span>';
  document.getElementById('page-sub').textContent = 'Join and start competing on the leaderboard.';
  document.getElementById('auth-submit').textContent = 'Create account →';
  document.getElementById('auth-submit').onclick = doRegister;
  document.getElementById('auth-password').autocomplete = 'new-password';
  document.querySelector('.auth-switch').innerHTML = `Have an account? <a onclick="showLogin()">Log in</a>`;
  document.getElementById('seed-note').style.display = 'none';
  clearAlert();
}

async function doLogin() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!username || !password) { showAlert('error','Please fill in both fields.'); return; }
  const btn = document.getElementById('auth-submit');
  btn.disabled = true; btn.textContent = 'Logging in…';
  try {
    const res = await fetch(API+'/api/login',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      showAlert('error', data.error||'Login failed.');
      btn.disabled=false; btn.textContent='Log in →'; return;
    }
    Session.set({username: data.username, password, role: data.role});
    window.location.href = 'home.html';
  } catch(e) {
    showAlert('error','Cannot reach server. Is it running?');
    btn.disabled=false; btn.textContent='Log in →';
  }
}

async function doRegister() {
  const username = document.getElementById('auth-username').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!username || !password) { showAlert('error','Please fill in both fields.'); return; }
  const btn = document.getElementById('auth-submit');
  btn.disabled = true; btn.textContent = 'Creating…';
  try {
    const res = await fetch(API+'/api/register',{
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username, password})
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      showAlert('error', data.error||'Registration failed.');
      btn.disabled=false; btn.textContent='Create account →'; return;
    }
    showLogin();
    showAlert('success','Account created! You can log in now.');
  } catch(e) {
    showAlert('error','Cannot reach server. Is it running?');
    btn.disabled=false; btn.textContent='Create account →';
  }
}

if (Session.get()) window.location.href = 'home.html';
document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('auth-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') mode==='login' ? doLogin() : doRegister();
  });
});
checkServerStatus();
</script>
</body>
</html>
