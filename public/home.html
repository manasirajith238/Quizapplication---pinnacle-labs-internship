<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home · Quiz Challenge</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="home-shell">
  <div class="brand">
    <div class="brand-mark">Q</div>
    <div class="brand-name">Quiz Challenge</div>
  </div>

  <div class="status-row">
    <div class="server-status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
  </div>

  <div class="welcome">
    <div class="greeting">Hey, <span id="display-name"></span>.</div>
    <p>What would you like to do?</p>
  </div>

  <div class="admin-badge-row" id="admin-badge-row" style="display:none">
    <span class="role-badge">admin</span>
  </div>

  <div class="menu-card" id="menu-card"></div>

  <div class="footer-note"></div>
</div>

<script src="js/app.js"></script>
<script>
const session = Session.requireLogin();
if (session) {
  document.getElementById('display-name').textContent = session.username;
  const isAdmin = session.role === 'admin';
  if (isAdmin) document.getElementById('admin-badge-row').style.display = '';

  function item(href, icon, cls, title, sub, extra='') {
    return `<a class="menu-item ${extra}" href="${href}">
      <div class="menu-icon ${cls}">${icon}</div>
      <div class="menu-text">
        <span class="menu-title">${title}</span>
        <span class="menu-sub">${sub}</span>
      </div>
      <span class="menu-arrow">→</span>
    </a>`;
  }

  document.getElementById('menu-card').innerHTML = `
    ${!isAdmin ? item('index.html','🎯','amber','Start Quiz','8 questions · 20 seconds each') : ''}
    ${item('dashboard.html', isAdmin?'📊':'🏆', isAdmin?'blue':'green',
      isAdmin?'Dashboard':'Leaderboard',
      isAdmin?'Stats, scores & all results':'Top scores across all players')}
    <button class="menu-item logout-item" onclick="logout()">
      <div class="menu-icon red">🚪</div>
      <div class="menu-text">
        <span class="menu-title">Log out</span>
        <span class="menu-sub">Sign out of your account</span>
      </div>
      <span class="menu-arrow">→</span>
    </button>`;

  document.querySelectorAll('.menu-card a').forEach(a => a.style.textDecoration = 'none');
}
checkServerStatus();
</script>
</body>
</html>
