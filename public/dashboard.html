<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Quiz Challenge</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="shell">
  <div class="brand">
    <div class="brand-mark">Q</div>
    <div class="brand-name">Quiz Challenge</div>
  </div>
  <div class="status-row">
    <div class="server-status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
  </div>

  <div class="topbar" id="topbar"></div>

  <div class="dash-heading">
    <h1>Dashboard<span>.</span></h1>
    <p id="dash-sub">Leaderboard & stats</p>
  </div>

  <!-- Admin stat tiles (admin only) -->
  <div id="admin-section" style="display:none">
    <div class="admin-stats" id="admin-stats-tiles"></div>
  </div>

  <!-- Leaderboard (everyone) -->
  <div class="section-title">Leaderboard</div>
  <div class="table-toolbar">
    <button class="link-btn" onclick="load()">↻ Refresh</button>
  </div>
  <div id="lb-panel"><div class="loading-row">Loading…</div></div>

</div>

<script src="js/app.js"></script>
<script>
let session = Session.requireLogin();

async function load() {
  await loadLeaderboard();
  if (session && session.role === 'admin') await loadAdminStats();
}

async function init() {
  if (!session) return;
  renderTopbar('dashboard');
  checkServerStatus();

  if (session.role === 'admin') {
    document.getElementById('admin-section').style.display = '';
    document.getElementById('dash-sub').textContent = 'Site stats & leaderboard';
  }

  await load();
}

async function loadLeaderboard() {
  const panel = document.getElementById('lb-panel');
  panel.innerHTML = '<div class="loading-row">Loading…</div>';
  try {
    const data = await fetch(API + '/api/leaderboard').then(r => r.json());
    if (!data.length) {
      panel.innerHTML = `<div class="empty-state"><p>No scores yet — play a quiz to get on the board!</p></div>`;
      return;
    }
    const rankLabel = r => r===1?'🥇':r===2?'🥈':r===3?'🥉':`#${r}`;
    panel.innerHTML = `
      <table class="data-table">
        <thead>
          <tr><th>Rank</th><th>Player</th><th>Score</th><th>Time</th></tr>
        </thead>
        <tbody>
          ${data.map(e => `
            <tr class="${e.name === session.username ? 'me' : ''}">
              <td class="rank-cell ${e.rank<=3?'rank-'+e.rank:''}">${rankLabel(e.rank)}</td>
              <td>${escapeHtml(e.name)}${e.name===session.username?' <span class="score-pct">(you)</span>':''}</td>
              <td class="mono">${e.score}/${e.total}<span class="score-pct"> ${Math.round(e.score/e.total*100)}%</span></td>
              <td class="mono">${(e.timeMs/1000).toFixed(1)}s</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  } catch(e) {
    panel.innerHTML = `<div class="empty-state"><p>Could not load leaderboard.</p></div>`;
  }
}

async function loadAdminStats() {
  try {
    const res = await fetch(API + '/api/admin/stats', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: session.username, password: session.password})
    });
    const data = await res.json();
    if (!res.ok || data.error) return;

    document.getElementById('admin-stats-tiles').innerHTML = [
      { v: data.totalUsers,                 n: 'Registered users' },
      { v: data.totalQuizzes,               n: 'Quizzes taken'    },
      { v: data.avgScorePct.toFixed(1)+'%', n: 'Average score'    },
    ].map(t => `
      <div class="admin-stat">
        <div class="admin-stat-v">${t.v}</div>
        <div class="admin-stat-n">${t.n}</div>
      </div>`).join('');
  } catch(e) {}
}

init();
</script>
</body>
</html>
