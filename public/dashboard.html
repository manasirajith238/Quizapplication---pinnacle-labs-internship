<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard · Quiz Challenge</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="shell">
  <div class="brand">
    <div class="brand-mark">Q</div>
    <div class="brand-name">Quiz Challenge</div>
  </div>

  <div class="status-row">
    <div class="server-status">
      <span class="dot" id="status-dot"></span>
      <span id="status-text">Connecting to server…</span>
    </div>
  </div>

  <div class="topbar" id="topbar"></div>

  <!-- Leaderboard section (everyone) -->
  <div class="section-title">Leaderboard</div>
  <div class="table-toolbar">
    <button class="link-btn" onclick="loadLeaderboard()">↻ Refresh</button>
  </div>
  <div class="card card-flush" id="lb-panel">
    <div class="loading-row">Loading…</div>
  </div>

  <!-- Admin section (admin role only) -->
  <div id="admin-section" style="display:none">
    <div class="section-title" style="margin-top:2rem">Admin — Site Stats</div>
    <div class="table-toolbar">
      <button class="link-btn" onclick="loadAdminStats()">↻ Refresh</button>
    </div>
    <div id="admin-stats-tiles" class="admin-stats"></div>
    <div class="section-title">Recent Results</div>
    <div class="card card-flush" id="admin-recent-panel">
      <div class="loading-row">Loading…</div>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
let session = Session.requireLogin();

async function init() {
  if (!session) return;
  renderTopbar('dashboard');
  checkServerStatus();
  await loadLeaderboard();
  if (session.role === 'admin') {
    document.getElementById('admin-section').style.display = '';
    await loadAdminStats();
  }
}

// ── Leaderboard ─────────────────────────────────────────────
async function loadLeaderboard() {
  const panel = document.getElementById('lb-panel');
  panel.innerHTML = '<div class="loading-row">Loading…</div>';
  try {
    const data = await fetch(API + '/api/leaderboard').then(r => r.json());
    if (!data.length) {
      panel.innerHTML = `<div class="empty-state">No scores yet — finish a quiz to get on the board!</div>`;
      return;
    }
    const rankLabel = r => r === 1 ? '🥇' : r === 2 ? '🥈' : r === 3 ? '🥉' : `#${r}`;
    panel.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Score</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody>
          ${data.map(e => `
            <tr class="${e.name === session.username ? 'me' : ''}">
              <td class="rank-cell ${e.rank <= 3 ? 'rank-' + e.rank : ''}">${rankLabel(e.rank)}</td>
              <td>${escapeHtml(e.name)}${e.name === session.username ? ' <span class="score-pct">(you)</span>' : ''}</td>
              <td class="mono">${e.score}/${e.total}<span class="score-pct"> ${Math.round(e.score/e.total*100)}%</span></td>
              <td class="mono">${(e.timeMs/1000).toFixed(1)}s</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  } catch (e) {
    panel.innerHTML = `<div class="empty-state">Could not load leaderboard. Is the server running?</div>`;
  }
}

// ── Admin stats ──────────────────────────────────────────────
async function loadAdminStats() {
  const tilesEl = document.getElementById('admin-stats-tiles');
  const recentEl = document.getElementById('admin-recent-panel');
  tilesEl.innerHTML = '';
  recentEl.innerHTML = '<div class="loading-row">Loading…</div>';

  try {
    const res = await fetch(API + '/api/admin/stats', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ username: session.username, password: session.password })
    });
    const data = await res.json();
    if (!res.ok || data.error) {
      recentEl.innerHTML = `<div class="empty-state">${escapeHtml(data.error || 'Could not load admin stats.')}</div>`;
      return;
    }

    // Stat tiles
    const tiles = [
      { v: data.totalUsers,             n: 'Registered users' },
      { v: data.totalQuizzes,           n: 'Quizzes taken' },
      { v: data.avgScorePct.toFixed(1) + '%', n: 'Average score' },
    ];
    tilesEl.innerHTML = tiles.map(t => `
      <div class="admin-stat">
        <div class="admin-stat-v">${t.v}</div>
        <div class="admin-stat-n">${t.n}</div>
      </div>`).join('');

    // Recent results table
    if (!data.recentResults.length) {
      recentEl.innerHTML = `<div class="empty-state">No quiz results yet.</div>`;
      return;
    }
    recentEl.innerHTML = `
      <table class="data-table">
        <thead>
          <tr>
            <th>User</th>
            <th>Score</th>
            <th>Time</th>
            <th>When</th>
          </tr>
        </thead>
        <tbody>
          ${data.recentResults.map(r => `
            <tr>
              <td>${escapeHtml(r.username)}</td>
              <td class="mono">${r.score}/${r.total}<span class="score-pct"> ${Math.round(r.score/r.total*100)}%</span></td>
              <td class="mono">${(r.timeMs/1000).toFixed(1)}s</td>
              <td class="mono" style="color:var(--ink-soft);font-size:12px">${escapeHtml(r.createdAt)}</td>
            </tr>`).join('')}
        </tbody>
      </table>`;
  } catch (e) {
    recentEl.innerHTML = `<div class="empty-state">Could not load admin stats. Is the server running?</div>`;
  }
}

init();
</script>
</body>
</html>
